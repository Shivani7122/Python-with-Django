<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Sign Up!</title>
    </head>
    <body>
        <h1>Course Sign Up Page</h1>
        <p>Please Note: First Name, Last Name, Password, and Email are required</p>
        <form action="thank_you!.html" method="get">
            <label>
                First Name: 
                <input type="text" name="" placeholder="First Name" required>
            </label>
            <label>
                Last Name: 
                <input type="text" name="" placeholder="Last Name" required>
            </label>
           <p></p>
            <label>
                Email: 
                <input type="email" name="" placeholder="name@email.com" required>
            </label>
            <label>
                Password:
                <input type="password" name="">
            </label>
        
            <p>Are you over the age of 18?</p>
            <label for="yes">Yes</label>
            <input id="yes" type="radio" name="age" value="">

            <label for="no">No</label>
            <input type="radio" name="age" id="no" value="">
            
            <p>Do you have a Credit Card or PayPal?</p>
            <select name="Payment" id="">
                <option value="Credit Card">Credit Card</option>
                <option value="PayPal">PayPal</option>
            </select>
            <p></p>
            <input type="submit" name="" value="Sign Up">
        </form>
    </body>
</html>
